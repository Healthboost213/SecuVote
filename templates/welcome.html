<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecuVote</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#f3f3f5;
      min-height:100vh;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .welcome-screen{
      text-align:center;
    }

    .welcome-screen h1{
      font-size:60px;
      font-weight:800;
      color:#1d2433;
      line-height:1.1;
      margin-bottom:10px;
    }

    .welcome-screen span{
      color:#5865f2;
    }

    .welcome-screen p{
      font-size:28px;
      color:#777;
      margin-bottom:55px;
      font-weight:400;
    }

    .welcome-screen p b{
      font-weight:700;
    }

    /* LOGO */

    .school-logo{
      width:250px;
      max-width:260px;
      height:auto;
      margin-bottom:30px;

      object-fit:contain;
    }

    /* Button */

    .login-btn{
      background:#405aee;
      color:white;
      border:none;
      padding:16px 42px;
      font-size:28px;
      border-radius:40px;
      cursor:pointer;
      font-weight:600;

      box-shadow:
        0 8px 18px rgba(64,90,238,0.35),
        inset 0 1px 1px rgba(255,255,255,0.2);

      transition:0.25s ease;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      background:#314ce6;
    }

 

    /* Responsive */

    @media(max-width:900px){

      .welcome-screen h1{
        font-size:55px;
      }

      .welcome-screen p{
        font-size:20px;
      }

      .login-btn{
        font-size:20px;
        padding:14px 32px;
      }
    }

  </style>
</head>

<body>

  <section class="welcome-screen">
  <!-- SCHOOL LOGO -->

    <h1>
      Welcome to the
      <span>Voting Portal</span>
    </h1>

    <p>
      Login using your <b>school login</b> to continue
    </p>

    <a href="/signin">
        <button class="login-btn">
           Login here
        </button>
    </a>

  </section> 
</body>
</html>
